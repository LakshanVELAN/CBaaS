name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'widget/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'widget/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            widget/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
        continue-on-error: true

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint
        continue-on-error: true

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        continue-on-error: true

      - name: Install widget dependencies
        run: |
          cd widget
          npm ci
        continue-on-error: true

      - name: Build widget
        run: |
          cd widget
          npm run build
        continue-on-error: true
